<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jigyasa Bhurtel</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent-cyan: #00f5ff;
      --accent-violet: #a855f7;
      --accent-pink: #f0abfc;
      --bg-deep: #020510;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background-color: var(--bg-deep);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 20% 30%, #0d0630 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 70%, #030d1a 0%, transparent 70%),
        radial-gradient(ellipse 80% 80% at 50% 50%, #060418 0%, transparent 80%);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 25%, #00f5ff12 0%, transparent 35%),
        radial-gradient(circle at 85% 75%, #a855f712 0%, transparent 35%),
        radial-gradient(circle at 50% 10%, #f0abfc08 0%, transparent 30%);
      animation: breathe 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes breathe {
      0% {
        opacity: 0.6;
        transform: scale(1);
      }
      100% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    /* Grid */
    .grid-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
    }

    /* Particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: drift linear infinite;
    }

    .particle:nth-child(1) {
      width: 3px;
      height: 3px;
      background: #00f5ff;
      left: 10%;
      animation-duration: 14s;
      top: 100%;
    }

    .particle:nth-child(2) {
      width: 2px;
      height: 2px;
      background: #a855f7;
      left: 30%;
      animation-duration: 18s;
      top: 100%;
    }

    .particle:nth-child(3) {
      width: 4px;
      height: 4px;
      background: #f0abfc;
      left: 60%;
      animation-duration: 15s;
      top: 100%;
    }

    .particle:nth-child(4) {
      width: 2px;
      height: 2px;
      background: #00f5ff;
      left: 85%;
      animation-duration: 20s;
      top: 100%;
    }

    @keyframes drift {
      0% {
        opacity: 0;
        transform: translateY(0) scale(1);
      }

      10% {
        opacity: 0.8;
      }

      90% {
        opacity: 0.5;
      }

      100% {
        opacity: 0;
        transform: translateY(-110vh) scale(0.5);
      }
    }

    /* Main */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 2rem;
      animation: fadeInUp 1.2s ease both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Profile */
    .profile-wrapper {
      position: relative;
      margin-bottom: 2.8rem;
      animation: floatBob 5s ease-in-out infinite;
    }

    @keyframes floatBob {
      0%,100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(14px);
      }
    }

    .profile-ring {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #00f5ff,
        #a855f7,
        #f0abfc,
        #00f5ff
      );
      animation: spinRing 6s linear infinite;
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 3px));
    }

    @keyframes spinRing {
      to {
        transform: rotate(360deg);
      }
    }

    .profile-halo {
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      background: radial-gradient(circle, #00f5ff22 0%, #a855f711 50%, transparent 70%);
      animation: haloBreath 3s ease-in-out infinite alternate;
    }

    @keyframes haloBreath {
      from {
        opacity: 0.4;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    .profile-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      border: 2px solid rgba(0,245,255,0.25);
      box-shadow:
        0 0 30px #00f5ff33,
        0 0 80px #a855f722;
    }

    .profile-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .profile-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 30%,
        rgba(255,255,255,0.06) 50%,
        transparent 70%
      );
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%) skewX(-20deg);
      }

      50%,100% {
        transform: translateX(200%) skewX(-20deg);
      }
    }

    /* Name */
    .name-block {
      text-align: center;
    }

    .name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(
        135deg,
        #e0f7ff 0%,
        #00f5ff 35%,
        #a855f7 65%,
        #f0abfc 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: nameGlow 4s ease-in-out infinite alternate;
    }

    @keyframes nameGlow {
      from {
        filter: drop-shadow(0 0 8px #00f5ff44);
      }

      to {
        filter: drop-shadow(0 0 22px #00f5ffaa);
      }
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 1.2rem;
    }

    .divider-line {
      width: 70px;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        var(--accent-cyan),
        transparent
      );
    }

    .divider-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-violet);
      box-shadow: 0 0 10px var(--accent-violet);
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      padding: 1.5rem;
      text-align: center;
    }

    .footer-inner {
      padding: 0.7rem 2rem;
      border-radius: 100px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,245,255,0.1);
      backdrop-filter: blur(10px);
    }

    footer p {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(180,220,255,0.45);
    }

    footer span {
      color: rgba(0,245,255,0.7);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .profile-img {
        width: 140px;
        height: 140px;
      }
    }

  </style>
</head>

<body>

  <div class="grid-lines"></div>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <main>

    <div class="profile-wrapper">
      <div class="profile-halo"></div>
      <div class="profile-ring"></div>

      <div class="profile-img">
        <img src="Jigyasa.jpg" alt="Jigyasa Bhurtel" class="profile-photo">
      </div>
    </div>

    <div class="name-block">
      <h1 class="name">Jigyasa Bhurtel</h1>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>
    </div>

  </main>

  <footer>
    <div class="footer-inner">
      <p>© 2026 <span>Jigyasa Bhurtel</span>. All Rights Reserved.</p>
    </div>
  </footer>

</body>
</html>
