<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jigyasa Bhurtel</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f5f0ea;
      --dark: #1a1612;
      --gold: #b8914a;
      --gold-light: #d4aa6a;
      --muted: #7a6f63;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    /* Decorative border */
    body::after {
      content: '';
      position: fixed;
      inset: 28px;
      border: 1px solid rgba(184,145,74,0.18);
      pointer-events: none;
      z-index: 5;
      animation: fadeIn 2s ease forwards;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Background glow */
    .glow {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184,145,74,0.10) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    /* Corners */
    .corner {
      position: fixed;
      width: 48px;
      height: 48px;
      opacity: 0;
      animation: fadeIn 1.8s ease 0.5s forwards;
    }

    .corner-tl {
      top: 20px;
      left: 20px;
      border-top: 1.5px solid var(--gold);
      border-left: 1.5px solid var(--gold);
    }

    .corner-tr {
      top: 20px;
      right: 20px;
      border-top: 1.5px solid var(--gold);
      border-right: 1.5px solid var(--gold);
    }

    .corner-bl {
      bottom: 20px;
      left: 20px;
      border-bottom: 1.5px solid var(--gold);
      border-left: 1.5px solid var(--gold);
    }

    .corner-br {
      bottom: 20px;
      right: 20px;
      border-bottom: 1.5px solid var(--gold);
      border-right: 1.5px solid var(--gold);
    }

    /* Profile */
    .profile-wrap {
      position: relative;
      margin-bottom: 42px;
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1.1s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
    }

    .profile-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(184,145,74,0.35);
      animation: spin 18s linear infinite;
    }

    .profile-ring::before {
      content: '';
      position: absolute;
      top: -3px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
    }

    .profile-circle {
      width: 178px;
      height: 178px;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, #e8ddd0 0%, #d4c9bc 100%);
      border: 2.5px solid rgba(184,145,74,0.5);
      position: relative;
      box-shadow:
        0 8px 40px rgba(184,145,74,0.12),
        0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .profile-circle:hover {
      transform: scale(1.03);
      box-shadow:
        0 14px 52px rgba(184,145,74,0.22),
        0 4px 16px rgba(0,0,0,0.10);
    }

    .profile-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Name */
    .name-wrap {
      text-align: center;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 1.1s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
    }

    .name-pre {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 10.5px;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      display: block;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 6vw, 4.6rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--dark);
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        var(--gold),
        transparent
      );
      margin: 20px auto 0;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 1.5s ease 1.4s forwards;
      z-index: 20;
    }

    footer span {
      color: var(--gold);
    }

    /* Animations */
    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.06);
        opacity: 0.7;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

  </style>
</head>

<body>

  <!-- Corners -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <main class="page">

    <!-- Glow -->
    <div class="glow"></div>

    <!-- Profile -->
    <div class="profile-wrap">

      <div class="profile-ring"></div>

      <div class="profile-circle">

        
        <img
          src="Jigyasa.jpg"
          alt="Jigyasa Bhurtel"
        />

      </div>

    </div>

    <!-- Name -->
    <div class="name-wrap">

      <span class="name-pre">
        Portfolio
      </span>

      <h1>
        Jigyasa <em>Bhurtel</em>
      </h1>

      <div class="divider"></div>

    </div>

  </main>

  <!-- Footer -->
  <footer>
    © 2026 <span>Jigyasa Bhurtel</span>. All Rights Reserved.
  </footer>

</body>
  </html>
